<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iman Kia's Portfolio Website">
    <meta name="author" content="Iman Kia">
    <title>Iman Kia :: Portfolio</title>
    
    <!-- Tab Icon -->
    <link rel="shortcut icon" type="image/x-icon" href="/static/img/favicon.png">
    
    <!-- Google Fonts: Montserrat (for premium headings) and Cabin (for highly readable body text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Main App Container -->
    <div id="container">
        <!-- Floating Navigation Header -->
        <header id="navbar">
            <div class="nav-content">
                <a href="#/home" class="logo">
                    <img src="/static/img/header-logo.png" alt="Logo" class="logo-img">
                    <span class="logo-text">Iman Kia</span>
                </a>
                <nav class="nav-links">
                    <a href="#/portfolio" id="nav-portfolio" class="nav-item">Projects</a>
                    <a href="#/about" id="nav-about" class="nav-item">About</a>
                    <a href="#/contact" id="nav-contact" class="nav-item">Contact</a>
                    <button id="lang-toggle" class="lang-btn">FR</button>
                </nav>
            </div>
        </header>

        <!-- Dynamic Page Mount Point -->
        <main id="app">
            <!-- Content will be injected dynamically by app.js -->
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </main>

        <!-- Site Footer -->
        <footer>
            <div class="footer-content">
                <span class="copyright">&copy; <span id="year">2026</span> Iman Kia</span>
                <span class="divider">•</span>
                <a href="mailto:contact@imankia.com" class="mail-link">contact@imankia.com</a>
            </div>
        </footer>
    </div>

    <!-- Frontend Router & Logic Application -->
    <script src="/static/js/app.js" type="module"></script>
</body>
</html>
